name: Daily Zotero Paper Digest

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ZOTERO_LIBRARY_ID: ${{ secrets.ZOTERO_LIBRARY_ID }}
      ZOTERO_API_KEY: ${{ secrets.ZOTERO_API_KEY }}
      ZOTERO_COLLECTION_KEYS: ${{ secrets.ZOTERO_COLLECTION_KEYS }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest job
        run: python -m src.main --config config.yaml --output-dir outputs

      - name: Save logs and digest artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zotero-paper-digest-${{ github.run_id }}
          path: |
            outputs/run.log
            outputs/digest.json
            outputs/digest.html
            outputs/digest.txt
          if-no-files-found: warn
